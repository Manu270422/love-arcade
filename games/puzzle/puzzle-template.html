<button class="btn-back-home" onclick="location.reload()">
    <i class="fas fa-arrow-left"></i>
    <span>Volver</span>
</button>

<div id="puzzle-game">

    <div class="puzzle-background"></div>

    <div id="puzzleMessage"></div>

    <div id="puzzle-board"></div>

    <div id="puzzleHUD">
        <span id="puzzle-status">Arma el rompecabezas... 💛</span>
    </div>

    <div id="puzzleFinal">
        <h2>¡Piezas Perfectas! 🧩❤️</h2>
        <p id="puzzleFinalText">Nuestra historia se construye pieza a pieza...</p>
        <button id="puzzleBtn" onclick="location.reload()">VER SORPRESA 💌</button>
    </div>

</div>

<audio id="puzzle-sound" src="games/puzzle/assets/music/snap.mp3" preload="auto"></audio>
<audio id="puzzle-win-sound" src="games/puzzle/assets/music/win.mp3" preload="auto"></audio>
